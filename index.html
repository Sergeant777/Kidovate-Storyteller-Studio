<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kidovate Storyteller | 2-Character Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&display=swap');
        .font-comic { font-family: 'Bangers', cursive; letter-spacing: 0.05em; }
        body { background-color: #020617; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        #viewport {
            height: 500px;
            width: 100%;
            background-color: #1e293b;
            position: relative;
            border: 8px solid #000;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            background-size: cover;
            background-position: center;
        }

        .movable {
            position: absolute;
            cursor: move;
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            touch-action: none;
            transform-origin: center center;
        }

        .movable.selected {
            outline: 3px dashed #06b6d4;
            outline-offset: 4px;
            background: rgba(6, 182, 212, 0.1);
            border-radius: 10px;
        }

        .movable img { 
            max-width: 250px; 
            max-height: 350px; 
            pointer-events: none; 
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }

        /* Speech Bubble Style */
        .speech-bubble-box {
            background: white;
            border: 4px solid black;
            border-radius: 30px;
            padding: 12px 24px;
            color: black;
            font-family: 'Bangers', cursive;
            font-size: 1.5rem;
            text-align: center;
            text-transform: uppercase;
            box-shadow: 8px 8px 0px rgba(0,0,0,1);
            min-width: 100px;
            max-width: 300px;
            position: relative;
        }
        .speech-bubble-box::after {
            content: '';
            position: absolute;
            bottom: -18px;
            left: 30px;
            border-width: 18px 18px 0 0;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }

        #onion-skin {
            position: absolute;
            inset: 0;
            z-index: 30;
            opacity: 0.3;
            pointer-events: none;
            display: none;
            background-size: cover;
            background-position: center;
        }

        #playback-overlay {
            position: absolute;
            inset: 0;
            z-index: 200;
            background: black;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .timeline-thumb {
            width: 100px;
            aspect-ratio: 4/5;
            border: 4px solid #0f172a;
            border-radius: 12px;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            background: #1e293b;
        }
        
        .timeline-thumb.active { border-color: #06b6d4; transform: scale(1.05); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4" onload="init()">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Sidebar: Controls -->
        <div class="lg:col-span-3 space-y-4 bg-slate-900 p-5 rounded-[40px] border border-slate-800 shadow-2xl h-fit">
            <div class="flex items-center gap-3 mb-4">
                <div class="bg-cyan-500 text-black px-3 py-1 rounded-lg font-black text-xl italic font-comic uppercase">K</div>
                <h2 class="text-xl font-black italic text-white font-comic uppercase tracking-tight">ANIMATOR</h2>
            </div>

            <!-- 1. Character Upload Slots -->
            <section class="space-y-2">
                <h3 class="text-[10px] font-black uppercase text-cyan-400">1. Upload Characters</h3>
                <div class="grid grid-cols-1 gap-2">
                    <button onclick="triggerUpload('charA')" class="w-full bg-slate-800 py-3 rounded-xl text-[10px] font-black uppercase border border-slate-700 hover:border-cyan-500 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="user-plus" class="w-4 h-4"></i> Character A
                    </button>
                    <button onclick="triggerUpload('charB')" class="w-full bg-slate-800 py-3 rounded-xl text-[10px] font-black uppercase border border-slate-700 hover:border-cyan-500 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="user-plus" class="w-4 h-4"></i> Character B
                    </button>
                </div>
                <input id="char-upload" type="file" class="hidden" accept="image/*" onchange="handleFileUpload(event)">
            </section>

            <!-- 2. Speech Bubble Tool -->
            <section class="space-y-2 border-t border-slate-800 pt-4">
                <h3 class="text-[10px] font-black uppercase text-cyan-400">2. Add Speech</h3>
                <div class="flex gap-2">
                    <input id="speech-input" type="text" placeholder="HELLO!" class="flex-1 bg-black border-2 border-slate-800 rounded-xl px-3 py-2 text-xs font-black uppercase text-white outline-none focus:border-cyan-500">
                    <button onclick="addSpeechBubble()" class="bg-cyan-600 px-4 rounded-xl font-black text-xl hover:bg-cyan-500 transition-all">+</button>
                </div>
                <p class="text-[8px] text-slate-500 uppercase italic">Add bubble then drag it next to your character</p>
            </section>

            <!-- 3. Edit Selected -->
            <section class="space-y-4 border-t border-slate-800 pt-4">
                <h3 class="text-[10px] font-black uppercase text-cyan-400">3. Edit Item</h3>
                <div class="flex gap-2">
                    <button onclick="flipSelected()" class="flex-1 bg-slate-800 p-3 rounded-xl hover:bg-slate-700 transition-all"><i data-lucide="flip-horizontal" class="w-4 h-4 mx-auto"></i></button>
                    <button onclick="deleteSelected()" class="flex-1 bg-red-900/20 text-red-500 p-3 rounded-xl border border-red-900/50 hover:bg-red-900/40 transition-all"><i data-lucide="trash-2" class="w-4 h-4 mx-auto"></i></button>
                </div>
                <div class="space-y-3">
                    <div class="flex justify-between text-[9px] uppercase font-bold text-slate-500"><span>Size</span></div>
                    <input type="range" id="size-slider" min="0.2" max="3" step="0.1" value="1" oninput="updateSelectedScale(this.value)" class="w-full accent-cyan-500">
                    <div class="flex justify-between text-[9px] uppercase font-bold text-slate-500"><span>Rotation</span></div>
                    <input type="range" id="rotate-slider" min="-180" max="180" step="1" value="0" oninput="updateSelectedRotation(this.value)" class="w-full accent-cyan-500">
                </div>
            </section>

            <button onclick="snapFrame()" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 py-6 rounded-3xl text-xl font-black uppercase shadow-xl active:scale-95 transition-all flex items-center justify-center gap-3">
                <i data-lucide="camera" class="w-6 h-6"></i> SNAP FRAME
            </button>
        </div>

        <!-- Main Studio Area -->
        <div class="lg:col-span-9 space-y-4">
            <div id="viewport" onpointerdown="handleStageDown(event)">
                <div id="onion-skin"></div>
                <div id="playback-overlay">
                    <img id="playback-img" src="" class="max-w-full max-h-full">
                </div>
                
                <!-- Actor & Bubble Layer -->
                <div id="actor-layer" class="absolute inset-0 pointer-events-none"></div>
                
                <div class="absolute bottom-6 left-6 flex items-center gap-2 bg-black/60 px-4 py-2 rounded-full border border-white/10 z-[60]">
                    <div class="w-2 h-2 rounded-full bg-red-600 animate-pulse"></div>
                    <span id="frame-count" class="text-[10px] font-black uppercase text-white tracking-widest">0 Frames</span>
                </div>
                <div class="absolute bottom-8 right-10 opacity-10 font-black italic text-6xl text-white pointer-events-none uppercase font-comic">KIDOVATE</div>
            </div>

            <!-- Timeline -->
            <div class="bg-slate-900 border border-slate-800 rounded-[50px] p-6 shadow-2xl">
                <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-4">
                    <div class="flex items-center gap-4">
                        <button id="play-btn" onclick="togglePlay()" class="bg-emerald-500 text-black px-8 py-3 rounded-2xl font-black uppercase flex items-center gap-3 shadow-lg active:scale-95 transition-all">
                            <i data-lucide="play" id="play-icon" class="w-5 h-5 fill-current"></i> <span id="play-text">PLAY PREVIEW</span>
                        </button>
                        <div class="flex flex-col">
                            <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Speed (FPS)</span>
                            <input type="range" min="1" max="12" value="4" class="w-24 accent-emerald-500" id="fps-slider">
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="resetEverything()" class="text-[10px] font-black text-red-500 uppercase px-4 py-2 hover:bg-red-500/10 rounded-xl transition-colors">Clear All</button>
                        <button onclick="downloadFrames()" class="bg-slate-800 px-4 py-2 rounded-xl text-[10px] font-black uppercase border border-slate-700 flex items-center gap-2 transition-all hover:text-white">
                            <i data-lucide="download" class="w-3 h-3"></i> Save Movie
                        </button>
                    </div>
                </div>
                <div id="timeline" class="flex gap-4 overflow-x-auto pb-4 scrollbar-hide min-h-[140px]">
                    <div id="empty-msg" class="w-full py-10 text-center border-4 border-dashed border-slate-800 rounded-[30px] opacity-20 uppercase font-black italic text-sm text-slate-400">Snap frames to start your animation!</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedEl = null;
        let activePointerId = null;
        let dragOffset = { x: 0, y: 0 };
        let frames = [];
        let isPlaying = false;
        let playInterval = null;
        let zCounter = 100;

        function init() {
            lucide.createIcons();
            window.addEventListener('pointermove', handlePointerMove);
            window.addEventListener('pointerup', handlePointerUp);
        }

        // --- UPLOAD LOGIC ---
        let currentSlot = '';
        function triggerUpload(slot) {
            currentSlot = slot;
            document.getElementById('char-upload').click();
        }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if(!file) return;
            const r = new FileReader();
            r.onload = (ev) => {
                createMovableItem(`<img src="${ev.target.result}" draggable="false">`, currentSlot);
                e.target.value = ''; // Reset for next upload
            };
            r.readAsDataURL(file);
        }

        function addSpeechBubble() {
            const val = document.getElementById('speech-input').value;
            if (!val.trim()) return;
            createMovableItem(`<div class="speech-bubble-box">${val}</div>`, 'bubble');
            document.getElementById('speech-input').value = '';
        }

        // --- CORE MOVABLE ENGINE ---
        function createMovableItem(content, id) {
            const viewport = document.getElementById('viewport');
            const el = document.createElement('div');
            el.className = "movable";
            el.id = id;
            el.innerHTML = content;
            el.style.left = "30%";
            el.style.top = "20%";
            
            // Initial Transform Data
            el.dataset.scale = 1;
            el.dataset.rotate = 0;
            el.dataset.flipped = "false";
            
            el.onpointerdown = (e) => {
                e.stopPropagation();
                selectItem(el);
                zCounter++;
                el.style.zIndex = zCounter;
                
                activePointerId = e.pointerId;
                const rect = el.getBoundingClientRect();
                dragOffset.x = e.clientX - rect.left;
                dragOffset.y = e.clientY - rect.top;
                el.setPointerCapture(e.pointerId);
            };

            el.ondblclick = () => el.remove();
            
            viewport.appendChild(el);
            selectItem(el);
            applyTransform(el);
        }

        function handleStageDown(e) {
            if (selectedEl) {
                selectedEl.classList.remove('selected');
                selectedEl = null;
            }
        }

        function handlePointerMove(e) {
            if (!selectedEl || activePointerId === null || e.pointerId !== activePointerId) return;
            const viewport = document.getElementById('viewport').getBoundingClientRect();
            selectedEl.style.left = (e.clientX - viewport.left - dragOffset.x) + 'px';
            selectedEl.style.top = (e.clientY - viewport.top - dragOffset.y) + 'px';
        }

        function handlePointerUp() { activePointerId = null; }

        function selectItem(el) {
            if (selectedEl) selectedEl.classList.remove('selected');
            selectedEl = el;
            selectedEl.classList.add('selected');
            
            // Sync Sliders
            document.getElementById('size-slider').value = el.dataset.scale;
            document.getElementById('rotate-slider').value = el.dataset.rotate;
        }

        function applyTransform(el) {
            const s = el.dataset.scale;
            const r = el.dataset.rotate;
            const f = el.dataset.flipped === "true" ? -1 : 1;
            el.style.transform = `scale(${s * f}, ${s}) rotate(${r}deg)`;
        }

        function updateSelectedScale(v) { if(selectedEl) { selectedEl.dataset.scale = v; applyTransform(selectedEl); } }
        function updateSelectedRotation(v) { if(selectedEl) { selectedEl.dataset.rotate = v; applyTransform(selectedEl); } }
        function flipSelected() { if(selectedEl) { selectedEl.dataset.flipped = selectedEl.dataset.flipped === "true" ? "false" : "true"; applyTransform(selectedEl); } }
        function deleteSelected() { if(selectedEl) { selectedEl.remove(); selectedEl = null; } }

        // --- ANIMATION CORE ---
        async function snapFrame() {
            if (isPlaying) togglePlay();
            const viewport = document.getElementById('viewport');
            
            // Hide selection outline for snapshot
            const currentSelected = selectedEl;
            if (selectedEl) selectedEl.classList.remove('selected');
            
            const canvas = await html2canvas(viewport, { backgroundColor: null, scale: 2 });
            const data = canvas.toDataURL("image/png");
            
            frames.push(data);
            
            // Restore selection
            if (currentSelected) currentSelected.classList.add('selected');
            
            // Update UI
            document.getElementById('onion-skin').style.backgroundImage = `url(${data})`;
            document.getElementById('onion-skin').style.display = 'block';
            document.getElementById('frame-count').innerText = `${frames.length} Frames`;
            
            const timeline = document.getElementById('timeline');
            const empty = document.getElementById('empty-msg');
            if (empty) empty.remove();
            
            const thumb = document.createElement('div');
            thumb.className = "timeline-thumb";
            thumb.innerHTML = `<img src="${data}" class="w-full h-full object-cover opacity-60"><div class="absolute bottom-1 right-1 text-[8px] font-black">${frames.length}</div>`;
            timeline.appendChild(thumb);
            timeline.scrollLeft = timeline.scrollWidth;
        }

        function togglePlay() {
            if (frames.length < 1) return;
            isPlaying = !isPlaying;
            const overlay = document.getElementById('playback-overlay');
            const img = document.getElementById('playback-img');
            const btnText = document.getElementById('play-text');
            const fps = document.getElementById('fps-slider').value;

            if (isPlaying) {
                overlay.style.display = 'flex';
                btnText.innerText = 'STOP';
                let i = 0;
                playInterval = setInterval(() => {
                    img.src = frames[i];
                    i = (i + 1) % frames.length;
                }, 1000 / fps);
            } else {
                clearInterval(playInterval);
                overlay.style.display = 'none';
                btnText.innerText = 'PLAY PREVIEW';
            }
        }

        function resetEverything() {
            if(confirm("Clear all frames and items?")) {
                frames = [];
                document.getElementById('timeline').innerHTML = '<div id="empty-msg" class="w-full py-10 text-center border-4 border-dashed border-slate-800 rounded-[30px] opacity-20 uppercase font-black italic text-sm text-slate-400">Snap frames to start your animation!</div>';
                document.querySelectorAll('.movable').forEach(m => m.remove());
                document.getElementById('onion-skin').style.display = 'none';
                document.getElementById('frame-count').innerText = '0 Frames';
                if (isPlaying) togglePlay();
            }
        }

        function downloadFrames() {
            if (frames.length === 0) return;
            frames.forEach((f, i) => {
                const a = document.createElement('a');
                a.download = `anim_frame_${(i+1).toString().padStart(3, '0')}.png`;
                a.href = f;
                a.click();
            });
        }
    </script>
</body>
</html>
