<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kidovate Storyteller | Live Stop-Motion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&display=swap');
        .font-comic { font-family: 'Bangers', cursive; letter-spacing: 0.05em; }
        body { background-color: #020617; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        #viewport {
            height: 500px;
            width: 100%;
            background-color: #000;
            position: relative;
            border: 8px solid #000;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        #camera-feed {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            display: none;
        }

        #onion-skin {
            position: absolute;
            inset: 0;
            z-index: 5;
            opacity: 0.35;
            pointer-events: none;
            display: none;
            background-size: cover;
            background-position: center;
        }

        #digital-overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        .movable {
            position: absolute;
            cursor: move;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            touch-action: none;
            transform-origin: center center;
            pointer-events: auto;
        }

        .movable.selected {
            outline: 3px dashed #06b6d4;
            outline-offset: 8px;
            border-radius: 20px;
        }

        .speech-sticker {
            background: white;
            border: 4px solid black;
            border-radius: 30px;
            padding: 12px 24px;
            color: black;
            font-family: 'Bangers', cursive;
            font-size: 1.5rem;
            text-align: center;
            text-transform: uppercase;
            box-shadow: 8px 8px 0px rgba(0,0,0,1);
            min-width: 100px;
            max-width: 300px;
            position: relative;
        }

        .speech-sticker::after {
            content: '';
            position: absolute;
            bottom: -18px;
            left: 30px;
            border-width: 18px 18px 0 0;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }

        #playback-overlay {
            position: absolute;
            inset: 0;
            z-index: 200;
            background: black;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .timeline-thumb {
            width: 100px;
            aspect-ratio: 4/5;
            border: 4px solid #0f172a;
            border-radius: 12px;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            background: #1e293b;
        }
        .timeline-thumb.active { border-color: #06b6d4; transform: scale(1.05); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }

        input[type=range] { accent-color: #06b6d4; }
    </style>
</head>
<body class="p-4" onload="init()">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Sidebar -->
        <div class="lg:col-span-3 space-y-4 bg-slate-900 p-5 rounded-[40px] border border-slate-800 shadow-2xl h-fit">
            <div class="flex items-center gap-3 mb-4">
                <div class="bg-cyan-500 text-black px-3 py-1 rounded-lg font-black text-xl italic font-comic uppercase">K</div>
                <h2 class="text-xl font-black italic text-white font-comic uppercase tracking-tight">STORYTELLER</h2>
            </div>

            <!-- 1. Camera Tools -->
            <section class="space-y-2">
                <h3 class="text-[10px] font-black uppercase text-cyan-400 tracking-widest">1. Setup Stage</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="toggleCamera()" class="bg-slate-800 py-3 rounded-xl text-[9px] font-black uppercase border border-slate-700 hover:border-cyan-500 transition-all flex flex-col items-center gap-1">
                        <i data-lucide="camera" id="cam-icon" class="w-4 h-4 text-cyan-400"></i>
                        <span id="cam-status">Start Camera</span>
                    </button>
                    <button onclick="flipCamera()" class="bg-slate-800 py-3 rounded-xl text-[9px] font-black uppercase border border-slate-700 flex flex-col items-center gap-1">
                        <i data-lucide="refresh-cw" class="w-4 h-4 text-emerald-400"></i>
                        <span>Switch Lens</span>
                    </button>
                </div>
            </section>

            <!-- 2. Dialogue Tools -->
            <section class="space-y-2 border-t border-slate-800 pt-4">
                <h3 class="text-[10px] font-black uppercase text-cyan-400 tracking-widest">2. Add Dialogue</h3>
                <div class="flex gap-2">
                    <input id="bubble-input" type="text" placeholder="WHAT DO THEY SAY?" class="flex-1 bg-black border-2 border-slate-800 rounded-xl px-3 py-3 text-xs font-black uppercase text-white outline-none focus:border-cyan-500">
                    <button onclick="addSpeechBubble()" class="bg-cyan-600 px-4 rounded-xl font-black text-lg hover:bg-cyan-500 transition-all">+</button>
                </div>
                <p class="text-[8px] text-slate-500 uppercase italic">Type text, hit +, then drag bubbles</p>
            </section>

            <!-- 3. Edit Selection -->
            <section class="space-y-4 border-t border-slate-800 pt-4">
                <h3 class="text-[10px] font-black uppercase text-cyan-400 tracking-widest">3. Edit Bubbles</h3>
                <div class="flex gap-2">
                    <button onclick="flipSelected()" class="flex-1 bg-slate-800 p-3 rounded-xl hover:bg-slate-700"><i data-lucide="flip-horizontal" class="w-4 h-4 mx-auto"></i></button>
                    <button onclick="deleteSelected()" class="flex-1 bg-red-900/20 text-red-500 p-3 rounded-xl border border-red-900/50 hover:bg-red-900/40"><i data-lucide="trash-2" class="w-4 h-4 mx-auto"></i></button>
                </div>
                <div class="space-y-3">
                    <div class="flex justify-between text-[8px] text-slate-500 uppercase font-black"><span>Scale</span></div>
                    <input type="range" id="size-slider" min="0.2" max="2.5" step="0.1" value="1" oninput="updateSelectedScale(this.value)" class="w-full">
                    <div class="flex justify-between text-[8px] text-slate-500 uppercase font-black"><span>Rotation</span></div>
                    <input type="range" id="rotate-slider" min="-180" max="180" step="1" value="0" oninput="updateSelectedRotation(this.value)" class="w-full">
                </div>
            </section>

            <button onclick="snapFrame()" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 py-6 rounded-3xl text-xl font-black uppercase shadow-xl active:scale-95 transition-all flex items-center justify-center gap-3">
                <i data-lucide="camera" class="w-6 h-6"></i> SNAP FRAME
            </button>
        </div>

        <!-- Viewport -->
        <div class="lg:col-span-9 space-y-4">
            <div id="viewport" onpointerdown="handleStageDown(event)">
                <video id="camera-feed" autoplay playsinline muted></video>
                <div id="onion-skin"></div>
                <div id="digital-layer" class="absolute inset-0 pointer-events-none"></div>
                
                <div id="playback-overlay">
                    <img id="playback-img" src="" class="max-w-full max-h-full">
                </div>
                
                <div class="absolute bottom-6 left-6 flex items-center gap-2 bg-black/60 px-4 py-2 rounded-full border border-white/10 z-[60]">
                    <div class="w-2 h-2 rounded-full bg-red-600 animate-pulse"></div>
                    <span id="frame-count" class="text-[10px] font-black uppercase text-white tracking-widest">0 Frames</span>
                </div>
                <div class="absolute bottom-8 right-10 opacity-10 font-black italic text-6xl text-white pointer-events-none uppercase font-comic">KIDOVATE</div>
            </div>

            <!-- Timeline -->
            <div class="bg-slate-900 border border-slate-800 rounded-[50px] p-6 shadow-2xl">
                <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-4">
                    <div class="flex items-center gap-4">
                        <button id="play-btn" onclick="togglePlay()" class="bg-emerald-500 text-black px-8 py-3 rounded-2xl font-black uppercase flex items-center gap-3 shadow-lg active:scale-95 transition-all">
                            <i data-lucide="play" id="play-icon" class="w-5 h-5 fill-current"></i> <span id="play-text">WATCH FILM</span>
                        </button>
                        <div class="flex flex-col">
                            <input type="range" min="1" max="15" value="5" class="w-24" id="fps-slider">
                            <span class="text-[8px] font-black text-slate-500 uppercase text-center">Speed</span>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="resetEverything()" class="text-[10px] font-black text-red-500 uppercase px-4 py-2 hover:bg-red-500/10 rounded-xl">Clear All</button>
                        <button onclick="downloadFrames()" class="bg-slate-800 px-4 py-2 rounded-xl text-[10px] font-black uppercase border border-slate-700 flex items-center gap-2">
                            <i data-lucide="download" class="w-3 h-3"></i> Save Images
                        </button>
                    </div>
                </div>
                <div id="timeline" class="flex gap-4 overflow-x-auto pb-4 scrollbar-hide min-h-[140px]">
                    <div id="empty-msg" class="w-full py-10 text-center border-4 border-dashed border-slate-800 rounded-[30px] opacity-20 uppercase font-black italic text-sm text-slate-400">Pose your toy and snap a frame!</div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="snap-canvas" class="hidden"></canvas>

    <script>
        let selectedEl = null;
        let activePointerId = null;
        let dragOffset = { x: 0, y: 0 };
        let frames = [];
        let isPlaying = false;
        let playInterval = null;
        let zCounter = 100;
        let stream = null;
        let facingMode = "environment";

        function init() {
            lucide.createIcons();
            window.addEventListener('pointermove', handlePointerMove);
            window.addEventListener('pointerup', handlePointerUp);
        }

        async function toggleCamera() {
            const video = document.getElementById('camera-feed');
            if (stream) { stopCamera(); return; }
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: false 
                });
                video.srcObject = stream;
                video.style.display = "block";
                document.getElementById('cam-status').innerText = "Stop Camera";
            } catch (err) { alert("Camera Access Error. Check browser permissions."); }
        }

        function stopCamera() {
            if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
            document.getElementById('camera-feed').style.display = "none";
            document.getElementById('cam-status').innerText = "Start Camera";
        }

        function flipCamera() {
            facingMode = (facingMode === "user") ? "environment" : "user";
            if (stream) { stopCamera(); toggleCamera(); }
        }

        function addSpeechBubble() {
            const val = document.getElementById('bubble-input').value;
            if (!val.trim()) return;

            const layer = document.getElementById('digital-layer');
            const el = document.createElement('div');
            el.className = "movable";
            el.innerHTML = `<div class="speech-sticker">${val}</div>`;
            el.style.left = "40%"; el.style.top = "20%";
            
            el.dataset.scale = 1;
            el.dataset.rotate = 0;
            el.dataset.flipped = "false";
            
            el.onpointerdown = (e) => {
                e.stopPropagation();
                selectElement(el);
                zCounter++; el.style.zIndex = zCounter;
                activePointerId = e.pointerId;
                const rect = el.getBoundingClientRect();
                dragOffset.x = e.clientX - rect.left;
                dragOffset.y = e.clientY - rect.top;
                el.setPointerCapture(e.pointerId);
            };

            el.ondblclick = () => { el.remove(); if(selectedEl===el) selectedEl=null; };
            
            layer.appendChild(el);
            selectElement(el);
            applyTransform(el);
            document.getElementById('bubble-input').value = '';
        }

        function handleStageDown() { if (selectedEl) { selectedEl.classList.remove('selected'); selectedEl = null; } }

        function handlePointerMove(e) {
            if (!selectedEl || activePointerId === null || e.pointerId !== activePointerId) return;
            const v = document.getElementById('viewport').getBoundingClientRect();
            selectedEl.style.left = (e.clientX - v.left - dragOffset.x) + 'px';
            selectedEl.style.top = (e.clientY - v.top - dragOffset.y) + 'px';
        }

        function handlePointerUp() { activePointerId = null; }

        function selectElement(el) {
            if (selectedEl) selectedEl.classList.remove('selected');
            selectedEl = el; el.classList.add('selected');
            document.getElementById('size-slider').value = el.dataset.scale;
            document.getElementById('rotate-slider').value = el.dataset.rotate;
        }

        function applyTransform(el) {
            const s = el.dataset.scale, r = el.dataset.rotate;
            const f = el.dataset.flipped === "true" ? -1 : 1;
            el.style.transform = `scale(${s * f}, ${s}) rotate(${r}deg)`;
        }

        function updateSelectedScale(v) { if(selectedEl) { selectedEl.dataset.scale = v; applyTransform(selectedEl); } }
        function updateSelectedRotation(v) { if(selectedEl) { selectedEl.dataset.rotate = v; applyTransform(selectedEl); } }
        function flipSelected() { if(selectedEl) { selectedEl.dataset.flipped = selectedEl.dataset.flipped === "true" ? "false" : "true"; applyTransform(selectedEl); } }
        function deleteSelected() { if(selectedEl) { selectedEl.remove(); selectedEl = null; } }

        async function snapFrame() {
            if (isPlaying) togglePlay();
            const viewport = document.getElementById('viewport');
            const video = document.getElementById('camera-feed');
            const canvas = document.getElementById('snap-canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = viewport.offsetWidth * 2; 
            canvas.height = viewport.offsetHeight * 2;

            // 1. Base Layer
            ctx.fillStyle = "#1e293b";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 2. Camera Frame
            if (stream && video.readyState >= 2) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            }

            // 3. Digital Overlays (Bubbles)
            const currentSelected = selectedEl;
            if (selectedEl) selectedEl.classList.remove('selected');
            
            const overlay = await html2canvas(viewport, { 
                backgroundColor: null, 
                scale: 2, 
                ignoreElements: (el) => el.id === 'camera-feed' || el.id === 'onion-skin' || el.id === 'playback-overlay'
            });
            ctx.drawImage(overlay, 0, 0, canvas.width, canvas.height);
            
            if (currentSelected) currentSelected.classList.add('selected');

            const data = canvas.toDataURL("image/png");
            frames.push(data);
            
            document.getElementById('onion-skin').style.backgroundImage = `url(${data})`;
            document.getElementById('onion-skin').style.display = 'block';
            document.getElementById('frame-count').innerText = `${frames.length} Frames`;
            
            const timeline = document.getElementById('timeline');
            const empty = document.getElementById('empty-msg');
            if (empty) empty.remove();
            const thumb = document.createElement('div');
            thumb.className = "timeline-thumb";
            thumb.innerHTML = `<img src="${data}" class="w-full h-full object-cover opacity-60"><div class="absolute bottom-1 right-1 text-[8px] font-black">${frames.length}</div>`;
            timeline.appendChild(thumb);
            timeline.scrollLeft = timeline.scrollWidth;
        }

        function togglePlay() {
            if (frames.length < 1) return;
            isPlaying = !isPlaying;
            const overlay = document.getElementById('playback-overlay');
            const img = document.getElementById('playback-img');
            const btnText = document.getElementById('play-text');
            if (isPlaying) {
                overlay.style.display = 'flex';
                btnText.innerText = 'STOP';
                let i = 0;
                playInterval = setInterval(() => {
                    img.src = frames[i];
                    i = (i + 1) % frames.length;
                }, 1000 / document.getElementById('fps-slider').value);
            } else {
                clearInterval(playInterval);
                overlay.style.display = 'none';
                btnText.innerText = 'WATCH FILM';
            }
        }

        function resetEverything() {
            if(!confirm("Reset the entire movie and clear all bubbles?")) return;
            frames = [];
            document.getElementById('timeline').innerHTML = '<div id="empty-msg" class="w-full py-10 text-center border-4 border-dashed border-slate-800 rounded-[30px] opacity-20 uppercase font-black italic text-sm text-slate-400">Pose your physical toy and snap a frame!</div>';
            document.getElementById('digital-layer').innerHTML = '';
            document.getElementById('onion-skin').style.display = 'none';
            document.getElementById('frame-count').innerText = '0 Frames';
            if (isPlaying) togglePlay();
        }

        function downloadFrames() {
            frames.forEach((f, i) => {
                const a = document.createElement('a');
                a.download = `anim_frame_${(i+1).toString().padStart(3, '0')}.png`;
                a.href = f; a.click();
            });
        }
    </script>
</body>
</html>
